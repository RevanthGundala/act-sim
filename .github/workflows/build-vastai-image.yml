name: Build VastAI image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/build-vastai-image.yml
      - deploy/vastai.Dockerfile
      - pyproject.toml
      - README.md
      - configs/**
      - models/**
      - utils/**

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/revanthgundala/act-sim-vastai

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/vastai.Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
